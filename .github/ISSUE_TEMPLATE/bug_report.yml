name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Open VS Code
        2. Run command '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: CodeBuddy version
      description: "Run `CodeBuddy: Show Version` or check Extensions panel."
      placeholder: e.g. 1.2.3
    validations:
      required: true

  - type: input
    id: vscode-version
    attributes:
      label: VS Code version
      description: "Help → About"
      placeholder: e.g. 1.90.0

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any relevant log output from the Output panel (CodeBuddy channel).
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context, screenshots, or screen recordings.
